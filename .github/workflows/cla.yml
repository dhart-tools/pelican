name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
      (github.event_name == 'pull_request_target')
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: '.github/cla-signatures.json'
          path-to-document: 'https://github.com/${{ github.repository }}/blob/main/CLA.md'
          branch: 'main'
          allowlist: henit-chobisa,bot*
          create-file-commit-message: 'chore: create CLA signatures file'
          signed-commit-message: 'chore: add ${{ github.event.comment.user.login }} CLA signature'
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, please sign our **Contributor License Agreement**.

            To sign, please add a comment on this PR with the exact text:

            > I have read the CLA Document and I hereby sign the CLA

            You can read the full CLA [here](https://github.com/${{ github.repository }}/blob/main/CLA.md).
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
