name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
permissions:
  contents: read
  checks: write
  pull-requests: write
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm run build
      - name: Run Tests
        id: test
        run: pnpm run test:jest --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: "./reports"
          JEST_JUNIT_OUTPUT_NAME: "results.xml"
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: '**/reports/results.xml'
          check_name: 'JUnit Test Report'
          require_tests: false
          fail_on_failure: true
          include_passed: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Post Detailed Test Comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            
            let body = '## 🧪 Detailed Test Results\n\n';
            
            try {
              if (!fs.existsSync('./reports/results.xml')) {
                body += '⚠️ Test report not found.';
              } else {
                const content = fs.readFileSync('./reports/results.xml', 'utf8');
                // Updated regex to be more flexible with attribute order
                const testsuitesMatch = content.match(/<testsuites[^>]*tests="(\d+)"[^>]*failures="(\d+)"[^>]*errors="(\d+)"[^>]*time="([\d.]+)"/);
                
                if (!testsuitesMatch) {
                  body += '⚠️ Could not parse test report XML.';
                } else {
                  const [_, total, failures, errors, time] = testsuitesMatch;
                  // Jest junit report doesn't always have skipped in <testsuites>
                  const skippedMatch = content.match(/skipped="(\d+)"/);
                  const skipped = skippedMatch ? parseInt(skippedMatch[1]) : 0;
                  
                  const failed = parseInt(failures) + parseInt(errors);
                  const passed = parseInt(total) - failed - skipped;
                  
                  body += `| Metric | Count |\n| :--- | :--- |\n| **Total Tests** | ${total} |\n| **Passed** | ✅ ${passed} |\n| **Failed** | ❌ ${failed} |\n| **Skipped** | ⚠️ ${skipped} |\n\n`;
                  body += `⏱ **Duration:** ${time}s\n\n`;
                }
              }
            } catch (err) {
              body += '⚠️ Error parsing test results: ' + err.message;
            }
            
            body += '\n\n[View Full CI Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
